# Konfigurasi Supabase lokal (minimal). Dihasilkan untuk System Naik Kelas.
# Dokumentasi lengkap: https://supabase.com/docs/guides/cli/config
project_id = "system-naik-kelas"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 16

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Untuk pengembangan lokal, konfirmasi email dimatikan agar mudah testing.
# Di produksi, pertimbangkan mengaktifkannya kembali.
enable_confirmations = false
